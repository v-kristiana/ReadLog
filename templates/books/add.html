{% extends 'base.html' %}

{% block title %}Add Book{% endblock %}

{% block content %}
    <h1>Add Book</h1>
    <form method="post" enctype="multipart/form-data">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Add Book</button>
    </form>
    <p><a href="{% url 'books:book_list' %}">Back to books</a></p>
{% endblock %}
