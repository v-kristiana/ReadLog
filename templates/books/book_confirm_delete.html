{% extends 'base.html' %}

{% block title %}Delete Book{% endblock %}

{% block content %}
    <h1>Delete Book</h1>
    <p>Are you sure you want to delete "{{ book.title }}" by {{ book.author }}?</p>
    <form method="post">
        {% csrf_token %}
        <button type="submit">Yes, delete</button>
        <a href="{% url 'books:book_detail' book.id %}">Cancel</a>
    </form>
{% endblock %}
