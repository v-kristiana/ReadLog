{% extends 'base.html' %}

{% block title %}Add Review{% endblock %}

{% block content %}
    <div class="form-container">
        <h1>Add review for {{ book.title }}</h1>
        <form method="post" class="book-form">
            {% csrf_token %}
            {{ form.as_p }}
            <button type="submit" class="form-button">Submit Review</button>
        </form>
        <p><a href="{% url 'books:book_detail' book.id %}">Back to book</a></p>
    </div>
{% endblock %}
